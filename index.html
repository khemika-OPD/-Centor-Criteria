<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centor Criteria - OPD Takhli</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary-blue: #007bff; 
            --dark-border: #000000;
            --soft-pink: #fff0f3;
        }
        
        body { 
            font-family: 'Sarabun', sans-serif; 
            background-color: var(--soft-pink); 
            margin: 0; padding: 5px; 
            display: flex; justify-content: center;
        }
        
        .main-card { 
            max-width: 500px; width: 100%; 
            background: #ffffff; border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
            border: 3px solid var(--dark-border);
            display: flex; flex-direction: column;
        }

        /* ปรับส่วนหัวให้เล็กลง 20% */
        .header-section {
            background: linear-gradient(135deg, #007bff, #0056b3);
            color: white; padding: 8px; text-align: center;
            border-bottom: 3px solid var(--dark-border);
        }
        .header-section h1 { margin: 0; font-size: 0.9rem; } 
        .header-section p { margin: 1px 0; font-size: 0.7rem; }

        .content-body { padding: 10px; }

        /* ลดระยะห่างของแต่ละรายการอาการ */
        .input-item { 
            background: #ffffff; border: 1px solid #ccc; padding: 8px; 
            border-radius: 8px; margin-bottom: 5px; display: flex; 
            align-items: center; cursor: pointer; font-weight: 700;
            font-size: 0.85rem;
        }
        .input-item input { width: 18px; height: 18px; margin-right: 10px; }

        /* ปรับส่วนคะแนนให้เล็กลง 20% และกระชับขึ้น */
        .result-display { 
            text-align: center; padding: 8px; border-radius: 12px; 
            color: White; border: 3px solid var(--dark-border); margin: 8px 0;
        }
        .score-label { font-size: 0.8rem; font-weight: 700; }
        .score-num { font-size: 2.4rem; font-weight: 700; line-height: 1; } 

        .share-area {
            background: #f8f9fa; padding: 8px; text-align: center;
            border-top: 2px dashed #ccc;
        }
        #qrcode_box { display: none; justify-content: center; margin: 8px 0; }
        #qrcode_box img { max-width: 100px; height: auto; }

        .btn-share {
            background: #333; color: white; border: none; padding: 8px;
            border-radius: 6px; font-family: 'Sarabun'; font-weight: 700; 
            cursor: pointer; width: 100%; font-size: 0.8rem;
        }
    </style>
</head>
<body>

<div class="main-card">
    <div class="header-section">
        <h1>Centor Criteria Calculator</h1>
        <p>OPD รพ.ตาคลี | โดย เขมิกา พงษ์ศรี</p>
    </div>

    <div class="content-body">
        <label class="input-item"><input type="checkbox" class="chk" onchange="calc()"><span>มีไข้ (> 38°C)</span></label>
        <label class="input-item"><input type="checkbox" class="chk" onchange="calc()"><span>ไม่มีอาการไอ</span></label>
        <label class="input-item"><input type="checkbox" class="chk" onchange="calc()"><span>ทอนซิลบวม/มีหนอง</span></label>
        <label class="input-item"><input type="checkbox" class="chk" onchange="calc()"><span>ต่อมน้ำเหลืองโต/กดเจ็บ</span></label>
        
        <select id="age" onchange="calc()" style="width:100%; padding:8px; border-radius:8px; font-family:'Sarabun'; font-weight:700; font-size:0.85rem; margin-bottom:8px;">
            <option value="1">อายุ 3 - 14 ปี (+1)</option>
            <option value="0" selected>อายุ 15 - 44 ปี (0)</option>
            <option value="-1">อายุ 45 ปีขึ้นไป (-1)</option>
        </select>

        <div id="cardColor" class="result-display" style="background-color: #27ae60;">
            <div class="score-label">คะแนนรวม</div>
            <div class="score-num" id="displayScore">0</div>
            <div id="rxPlan" style="font-weight: 700; margin-top: 3px; font-size: 0.75rem;">รักษาตามอาการ ไม่ใช้ Antibiotic</div>
        </div>
    </div>

    <div class="share-area">
        <button class="btn-share" onclick="toggleQR()">แสดง / ซ่อน QR Code สำหรับแชร์แอป</button>
        <div id="qrcode_box"></div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
    function calc() {
        let s = 0;
        document.querySelectorAll('.chk:checked').forEach(() => s++);
        s += parseInt(document.getElementById('age').value);
        
        document.getElementById('displayScore').innerText = s;
        const card = document.getElementById('cardColor');
        const rx = document.getElementById('rxPlan');

        if (s <= 1) {
            card.style.backgroundColor = "#27ae60";
            rx.innerText = "รักษาตามอาการ ไม่ใช้ Antibiotic";
        } else if (s <= 3) {
            card.style.backgroundColor = "#f39c12";
            rx.innerText = "พิจารณาผล Lab ก่อนเริ่มยา";
        } else {
            card.style.backgroundColor = "#d63031";
            rx.innerText = "พิจารณาให้ Antibiotics ทันที";
        }
    }

    function toggleQR() {
        const box = document.getElementById('qrcode_box');
        if (box.style.display === "flex") {
            box.style.display = "none";
        } else {
            box.style.display = "flex";
            if (box.innerHTML === "") {
                new QRCode(box, {
                    text: window.location.href,
                    width: 100, height: 100 
                });
            }
        }
    }
</script>

</body>
</html>
