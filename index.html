<!DOCTYPE html>
<html lang="th">
<head><!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centor Criteria - OPD Takhli</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary-blue: #007bff; 
            --dark-border: #000000;
            --soft-pink: #fff0f3;
        }
        
        body { 
            font-family: 'Sarabun', sans-serif; 
            background-color: var(--soft-pink); 
            margin: 0; padding: 10px; 
            display: flex; justify-content: center;
        }
        
        .main-card { 
            max-width: 800px; width: 100%; 
            background: #ffffff; border-radius: 20px; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.3); 
            overflow: hidden; border: 4px solid var(--dark-border);
        }

        .header-section {
            background: linear-gradient(135deg, #007bff, #0056b3);
            color: white; padding: 20px; text-align: center;
            border-bottom: 4px solid var(--dark-border);
        }

        .flex-body { display: flex; flex-direction: column; padding: 20px; }

        .input-group { margin-bottom: 20px; }
        .input-item { 
            background: #ffffff; border: 2px solid #ccc; padding: 15px; 
            border-radius: 12px; margin-bottom: 10px; display: flex; 
            align-items: center; cursor: pointer; font-weight: 700;
        }
        .input-item input { width: 25px; height: 25px; margin-right: 15px; }

        .result-section { 
            text-align: center; padding: 20px; border-radius: 20px; 
            color: White; border: 4px solid var(--dark-border); margin-bottom: 20px;
        }
        .score-num { font-size: 5rem; font-weight: 700; line-height: 1; }

        /* ส่วน QR Code (ซ่อนไว้เริ่มต้น) */
        .qr-wrapper {
            display: none; /* ซ่อนไว้ */
            text-align: center; margin-top: 15px; padding: 20px;
            border-top: 2px dashed #ccc; background: #f9f9f9;
        }
        #qrcode_box img { margin: 0 auto; max-width: 150px; height: auto; }

        .btn-action {
            width: 100%; padding: 15px; border: none; border-radius: 12px;
            font-family: 'Sarabun'; font-weight: 700; font-size: 1.1rem;
            cursor: pointer; transition: 0.2s;
        }
    </style>
</head>
<body>

<div class="main-card">
    <div class="header-section">
        <h1 style="margin:0; font-size: 1.6rem;">Centor Criteria Calculator</h1>
        <p style="margin:5px 0;">OPD รพ.ตาคลี | โดย เขมิกา พงษ์ศรี</p>
    </div>

    <div class="flex-body">
        <!-- ส่วนคำนวณ (ด้านบน) -->
        <div class="input-group">
            <label class="input-item"><input type="checkbox" class="chk" onchange="calc()"><span>มีไข้ (> 38°C)</span></label>
            <label class="input-item"><input type="checkbox" class="chk" onchange="calc()"><span>ไม่มีอาการไอ</span></label>
            <label class="input-item"><input type="checkbox" class="chk" onchange="calc()"><span>ทอนซิลบวมหรือมีหนอง</span></label>
            <label class="input-item"><input type="checkbox" class="chk" onchange="calc()"><span>ต่อมน้ำเหลืองโตและกดเจ็บ</span></label>
            
            <select id="age" onchange="calc()" style="width:100%; padding:15px; border-radius:12px; border:2px solid #ccc; font-family:'Sarabun'; font-weight:700; font-size:1rem;">
                <option value="1">อายุ 3 - 14 ปี (+1)</option>
                <option value="0" selected>อายุ 15 - 44 ปี (0)</option>
                <option value="-1">อายุ 45 ปีขึ้นไป (-1)</option>
            </select>
        </div>

        <div id="cardColor" class="result-section" style="background-color: #27ae60;">
            <div style="font-size: 1.2rem; font-weight: 700;">คะแนนรวม: <span id="displayScore">0</span></div>
            <div class="score-num" id="bigScore">0</div>
            <div id="rxPlan" style="margin-top:10px; font-weight:700;">รักษาตามอาการ ไม่ใช้ Antibiotic</div>
        </div>

        <!-- ปุ่มควบคุม QR Code (ด้านล่าง) -->
        <button class="btn-action" style="background-color: #333; color: white;" onclick="toggleQR()">
            แสดง / ซ่อน QR Code สำหรับแชร์แอป
        </button>

        <div id="qrArea" class="qr-wrapper">
            <p style="font-weight:700; color:#007bff;">สแกนเพื่อเข้าใช้งานแอปนี้</p>
            <div id="qrcode_box" style="display: flex; justify-content: center; margin-bottom: 10px;"></div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
    // ฟังก์ชันคำนวณคะแนน
    function calc() {
        let score = 0;
        document.querySelectorAll('.chk:checked').forEach(() => score++);
        score += parseInt(document.getElementById('age').value);
        
        document.getElementById('displayScore').innerText = score;
        document.getElementById('bigScore').innerText = score;
        
        const card = document.getElementById('cardColor');
        const rx = document.getElementById('rxPlan');

        if (score <= 1) {
            card.style.backgroundColor = "#27ae60"; // เขียว
            rx.innerText = "ความเสี่ยงต่ำ: รักษาตามอาการ ไม่ใช้ Antibiotic";
        } else if (score <= 3) {
            card.style.backgroundColor = "#f39c12"; // ส้ม
            rx.innerText = "ความเสี่ยงปานกลาง: พิจารณาผลตรวจ Lab ก่อนเริ่มยา";
        } else {
            card.style.backgroundColor = "#d63031"; // แดง
            rx.innerText = "ความเสี่ยงสูง: พิจารณาให้ Antibiotics";
        }
    }

    // ฟังก์ชันเปิด/ปิด QR Code
    function toggleQR() {
        const qrArea = document.getElementById('qrArea');
        const qrBox = document.getElementById('qrcode_box');
        
        if (qrArea.style.display === "block") {
            qrArea.style.display = "none";
        } else {
            qrArea.style.display = "block";
            // สร้าง QR Code ถ้ายังไม่มี
            if (qrBox.innerHTML === "") {
                new QRCode(qrBox, {
                    text: window.location.href, // ใช้ URL ปัจจุบันอัตโนมัติ
                    width: 150,
                    height: 150
                });
            }
        }
    }
</script>
</body>
</html>
