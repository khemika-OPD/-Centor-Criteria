<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centor Criteria - OPD Takhli</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary-blue: #007bff; 
            --dark-border: #000000;
            --soft-pink: #fff0f3;
        }
        
        body { 
            font-family: 'Sarabun', sans-serif; 
            background-color: var(--soft-pink); 
            margin: 0; padding: 10px; 
            display: flex; justify-content: center;
        }
        
        .main-card { 
            max-width: 800px; width: 100%; 
            background: #ffffff; border-radius: 20px; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.3); 
            border: 4px solid var(--dark-border);
            display: flex; flex-direction: column; /* จัดเรียงจากบนลงล่าง */
        }

        .header-section {
            background: linear-gradient(135deg, #007bff, #0056b3);
            color: white; padding: 20px; text-align: center;
            border-bottom: 4px solid var(--dark-border);
        }

        .content-body { padding: 20px; }

        .input-item { 
            background: #ffffff; border: 2px solid #ccc; padding: 15px; 
            border-radius: 12px; margin-bottom: 10px; display: flex; 
            align-items: center; cursor: pointer; font-weight: 700;
        }
        .input-item input { width: 25px; height: 25px; margin-right: 15px; }

        .result-display { 
            text-align: center; padding: 20px; border-radius: 20px; 
            color: White; border: 4px solid var(--dark-border); margin: 20px 0;
        }
        .score-num { font-size: 5rem; font-weight: 700; line-height: 1; }

        /* ส่วน QR Code (ซ่อนไว้เริ่มต้นและอยู่ล่างสุด) */
        .share-area {
            background: #f8f9fa; padding: 20px; text-align: center;
            border-top: 2px dashed #ccc;
        }
        #qrcode_box { display: none; justify-content: center; margin: 15px 0; }
        #qrcode_box img { max-width: 150px; height: auto; }

        .btn-share {
            background: #333; color: white; border: none; padding: 15px 25px;
            border-radius: 10px; font-family: 'Sarabun'; font-weight: 700; cursor: pointer;
            width: 100%; /* เต็มหน้าจอมือถือ */
        }
    </style>
</head>
<body>

<div class="main-card">
    <div class="header-section">
        <h1 style="margin:0; font-size: 1.5rem;">Centor Criteria Calculator</h1>
        <p style="margin:5px 0;">OPD รพ.ตาคลี | โดย เขมิกา พงษ์ศรี</p>
    </div>

    <div class="content-body">
        <!-- 1. ส่วนประเมินอาการ (ด้านบน) -->
        <label class="input-item"><input type="checkbox" class="chk" onchange="calc()"><span>มีไข้ (> 38°C)</span></label>
        <label class="input-item"><input type="checkbox" class="chk" onchange="calc()"><span>ไม่มีอาการไอ</span></label>
        <label class="input-item"><input type="checkbox" class="chk" onchange="calc()"><span>ทอนซิลบวม/มีหนอง</span></label>
        <label class="input-item"><input type="checkbox" class="chk" onchange="calc()"><span>ต่อมน้ำเหลืองโต/กดเจ็บ</span></label>
        
        <select id="age" onchange="calc()" style="width:100%; padding:15px; border-radius:12px; font-family:'Sarabun'; font-weight:700; font-size:1rem; margin-bottom:20px;">
            <option value="1">อายุ 3 - 14 ปี (+1)</option>
            <option value="0" selected>อายุ 15 - 44 ปี (0)</option>
            <option value="-1">อายุ 45 ปีขึ้นไป (-1)</option>
        </select>

        <!-- 2. ส่วนผลลัพธ์ (ถัดลงมา) -->
        <div id="cardColor" class="result-display" style="background-color: #27ae60;">
            <div style="font-weight: 700;">คะแนนรวม</div>
            <div class="score-num" id="displayScore">0</div>
            <div id="rxPlan" style="font-weight: 700; margin-top: 10px;">รักษาตามอาการ ไม่ใช้ Antibiotic</div>
        </div>
    </div>

    <!-- 3. ส่วนแชร์แอป (ล่างสุด) -->
    <div class="share-area">
        <button class="btn-share" onclick="toggleQR()">แสดง / ซ่อน QR Code สำหรับแชร์แอป</button>
        <div id="qrcode_box"></div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
    function calc() {
        let s = 0;
        document.querySelectorAll('.chk:checked').forEach(() => s++);
        s += parseInt(document.getElementById('age').value);
        
        document.getElementById('displayScore').innerText = s;
        const card = document.getElementById('cardColor');
        const rx = document.getElementById('rxPlan');

        if (s <= 1) {
            card.style.backgroundColor = "#27ae60";
            rx.innerText = "รักษาตามอาการ ไม่ใช้ Antibiotic";
        } else if (s <= 3) {
            card.style.backgroundColor = "#f39c12";
            rx.innerText = "พิจารณาผลตรวจ Lab ก่อนเริ่มยา";
        } else {
            card.style.backgroundColor = "#d63031";
            rx.innerText = "พิจารณาให้ Antibiotics ทันที";
        }
    }

    function toggleQR() {
        const box = document.getElementById('qrcode_box');
        if (box.style.display === "flex") {
            box.style.display = "none";
        } else {
            box.style.display = "flex";
            if (box.innerHTML === "") {
                new QRCode(box, {
                    text: window.location.href, // ดึงลิงก์ GitHub อัตโนมัติ
                    width: 150, height: 150
                });
            }
        }
    }
</script>

</body>
</html>
